name: Build Debian package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            debhelper \
            dh-python \
            fakeroot \
            ffmpeg \
            pybuild-plugin-pyproject \
            python3-all \
            python3-rich \
            python3-setuptools \
            python3-wheel

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p artifacts
          cp ../mediahelper_* artifacts/

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: |
            artifacts/mediahelper_*_all.deb
            artifacts/mediahelper_*.buildinfo
            artifacts/mediahelper_*.changes
